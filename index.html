<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEDC GIS Enumeration — Public Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--primary:#2563eb;--primary-light:#dbeafe;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;
    --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--radius:12px;}
  *{box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:var(--text);margin:0;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;z-index:-1;background:linear-gradient(135deg,#e0e7ff 0%,#f0f4f8 40%,#fdf2ff 100%);}
  .wrap{max-width:1200px;margin:0 auto;padding:18px;}
  header{background:#fff;border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow-md);border:1px solid var(--border);margin-bottom:14px;}
  header h1{margin:0;font-size:1.4rem;}
  header p{margin:4px 0 0;color:var(--text-muted);font-size:.85rem;}
  .tabs{display:flex;background:#fff;border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--border);border-bottom:none;overflow:hidden;}
  .tabs button{flex:1;padding:13px 18px;border:none;background:none;font-family:inherit;font-weight:600;font-size:.9rem;color:var(--text-muted);cursor:pointer;}
  .tabs button.active{color:var(--primary);background:#f0f7ff;border-bottom:3px solid var(--primary);}
  .panel{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow-md);padding:20px;}
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;}
  .field label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:4px;}
  .field input,.field select{padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-family:inherit;font-size:.85rem;min-width:200px;}
  .btn{padding:8px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:600;font-size:.85rem;cursor:pointer;}
  .btn:hover{background:#1d4ed8;}
  .group{background:#fff;border-radius:8px;padding:12px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
  .group h3{margin:0 0 8px;font-size:.9rem;display:flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block;}
  table{width:100%;border-collapse:collapse;font-size:.78rem;}
  th,td{border:1px solid #e5e7eb;padding:6px 8px;text-align:center;}
  th{font-weight:700;}
  td:nth-child(2){text-align:left;}
  tfoot td{font-weight:700;background:#f1f5f9;}
  .empty{padding:30px;text-align:center;color:var(--text-muted);font-style:italic;}
  .status{font-size:.8rem;color:var(--text-muted);margin-bottom:10px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
  @media(max-width:640px){.field input,.field select{min-width:140px;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📊 AEDC GIS Enumeration — Public Dashboard</h1>
    <p>Read-only view. Select a date or month to view performance.</p>
  </header>

  <div class="tabs">
    <button class="active" onclick="switchTab('dashboard')" id="tab-dashboard">📊 Dashboard</button>
    <button onclick="switchTab('monthly')" id="tab-monthly">📅 Monthly Performance</button>
  </div>

  <!-- DASHBOARD TAB -->
  <div class="panel" id="panel-dashboard">
    <div class="controls">
      <div class="field">
        <label>Select Date</label>
        <input type="date" id="dashDate" onchange="loadDashboardForDate()">
      </div>
      <div class="field" style="flex:1;">
        <label>Search Name(s)</label>
        <input type="text" id="dashSearch" placeholder="Type one or more names, comma-separated" oninput="renderDashboard()">
      </div>
    </div>
    <div class="status" id="dashStatus">Pick a date above to load the dashboard.</div>
    <div id="dashContent"></div>
  </div>

  <!-- MONTHLY TAB -->
  <div class="panel" id="panel-monthly" style="display:none;">
    <div class="controls">
      <div class="field">
        <label>Select Month</label>
        <select id="monthSelect" onchange="loadMonth()">
          <option value="">— choose a month —</option>
        </select>
      </div>
      <div class="field" style="flex:1;">
        <label>Search Name(s)</label>
        <input type="text" id="monthSearch" placeholder="Type one or more names, comma-separated" oninput="renderMonth()">
      </div>
    </div>
    <div class="status" id="monthStatus">Pick a month above to load monthly performance.</div>
    <div id="monthRemark" style="display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.85rem;color:#92400e;"></div>
    <div id="monthContent"></div>
  </div>
</div>

<script>
// ── Firebase (read-only — database rules restrict writes to the admin UID) ──
const firebaseConfig = {
    apiKey: "AIzaSyA_Ql8LLNx4jf8o6H89u9iwSAmeZflj-hs",
    authDomain: "spugis.firebaseapp.com",
    databaseURL: "https://spugis-default-rtdb.firebaseio.com",
    projectId: "spugis",
    storageBucket: "spugis.firebasestorage.app",
    messagingSenderId: "295940607308",
    appId: "1:295940607308:web:5ad07c96ab8ede791d13e9"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const GROUPS = [
  {key:'aedc', label:'AEDC Enumerators', dot:'#3b82f6'},
  {key:'bss',  label:'BSS Enumerators',  dot:'#22c55e'},
  {key:'nysc', label:'NYSC Enumerators', dot:'#f97316'}
];

function escapeHtml(text){const d=document.createElement('div');d.textContent=text==null?'':String(text);return d.innerHTML;}
function toArray(v){ if(!v) return []; if(Array.isArray(v)) return v; return Object.keys(v).sort((a,b)=>Number(a)-Number(b)).map(k=>v[k]); }
function formatDateFull(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-US',{weekday:'long', year:'numeric', month:'long', day:'numeric'});
}
function nameFilter(inputId){
  const raw = document.getElementById(inputId).value.trim().toLowerCase();
  if(!raw) return null;
  return raw.split(',').map(s=>s.trim()).filter(Boolean);
}
function matchesFilter(fullname, terms){
  if(!terms) return true;
  const n = (fullname||'').toLowerCase();
  return terms.some(t=>n.includes(t));
}

function switchTab(tab){
  document.getElementById('tab-dashboard').classList.toggle('active', tab==='dashboard');
  document.getElementById('tab-monthly').classList.toggle('active', tab==='monthly');
  document.getElementById('panel-dashboard').style.display = tab==='dashboard' ? 'block':'none';
  document.getElementById('panel-monthly').style.display = tab==='monthly' ? 'block':'none';
}

// ───────────────────────── DASHBOARD (single date only) ─────────────────────────
let currentDashboard = null;

async function loadDashboardForDate(){
  const dateKey = document.getElementById('dashDate').value;
  const statusEl = document.getElementById('dashStatus');
  if(!dateKey){ statusEl.textContent='Pick a date above to load the dashboard.'; return; }
  statusEl.textContent = `Loading ${formatDateFull(dateKey)}…`;
  document.getElementById('dashContent').innerHTML = '';
  try{
    const snap = await database.ref(`dashboards/${dateKey}`).once('value');
    const raw = snap.val();
    if(!raw){
      currentDashboard = null;
      statusEl.textContent = `No dashboard found for ${formatDateFull(dateKey)}.`;
      document.getElementById('dashContent').innerHTML = `<div class="empty">No data published for this date yet.</div>`;
      return;
    }
    currentDashboard = {
      aedc: toArray(raw.aedc && raw.aedc.results),
      bss:  toArray(raw.bss  && raw.bss.results),
      nysc: toArray(raw.nysc && raw.nysc.results)
    };
    statusEl.textContent = `Showing dashboard for ${formatDateFull(dateKey)}`;
    renderDashboard();
  }catch(e){
    console.error(e);
    statusEl.textContent = 'Failed to load dashboard: ' + e.message;
  }
}

function renderDashboard(){
  if(!currentDashboard) return;
  const terms = nameFilter('dashSearch');
  const html = GROUPS.map(g=>{
    const rows = currentDashboard[g.key].filter(r=>matchesFilter(r.fullname, terms));
    if(!rows.length){
      return `<div class="group"><h3><span class="dot" style="background:${g.dot}"></span>${g.label}</h3><div class="empty">No matching records</div></div>`;
    }
    let totals = {dss:0,ht:0,cust:0,lt:0,issues:0,total:0};
    const body = rows.map((r,i)=>{
      totals.dss+=r.dss||0; totals.ht+=r.ht||0; totals.cust+=r.cust||0; totals.lt+=r.lt||0; totals.issues+=r.issues||0; totals.total+=r.total||0;
      const statusBadge = r.status==='excused'
        ? `<span class="badge" style="background:#fef3c7;color:#92400e;">Excused</span>`
        : r.status==='sick'
        ? `<span class="badge" style="background:#fee2e2;color:#991b1b;">Sick</span>`
        : (r.total||0)===0
        ? `<span class="badge" style="background:#f3f4f6;color:#374151;">No Activity</span>`
        : `<span class="badge" style="background:#dcfce7;color:#166534;">Present</span>`;
      return `<tr>
        <td>${i+1}</td>
        <td>${escapeHtml(r.fullname)}</td>
        <td>${r.dss||0}</td>
        <td>${r.ht||0}</td>
        <td>${r.cust||0}</td>
        <td>${r.lt||0}</td>
        <td>${r.issues||0}</td>
        <td><strong>${r.total||0}</strong></td>
        <td>${statusBadge}</td>
        <td>${escapeHtml(r.savedFeeder||'')}</td>
      </tr>`;
    }).join('');
    return `<div class="group">
      <h3><span class="dot" style="background:${g.dot}"></span>${g.label}</h3>
      <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>S/N</th><th>Full Name</th><th>DT/DSS</th><th>HT</th><th>Cust</th><th>LT</th><th>Issues</th><th>Total</th><th>Status</th><th>Feeder</th></tr></thead>
        <tbody>${body}</tbody>
        <tfoot><tr><td colspan="2">TOTAL</td><td>${totals.dss}</td><td>${totals.ht}</td><td>${totals.cust}</td><td>${totals.lt}</td><td>${totals.issues}</td><td>${totals.total}</td><td colspan="2"></td></tr></tfoot>
      </table>
      </div>
    </div>`;
  }).join('');
  document.getElementById('dashContent').innerHTML = html;
}

// ───────────────────────── MONTHLY PERFORMANCE ─────────────────────────
let mpSavedMonths = {};

function mpFormatMonthLabel(key){
  const [y,m] = key.split('-');
  const d = new Date(parseInt(y), parseInt(m)-1, 1);
  return d.toLocaleDateString('en-US',{month:'long', year:'numeric'});
}

async function mpLoadMonthList(){
  try{
    const snap = await database.ref('monthlyPerformance').once('value');
    mpSavedMonths = snap.val() || {};
    const sel = document.getElementById('monthSelect');
    const keys = Object.keys(mpSavedMonths).sort().reverse();
    sel.innerHTML = '<option value="">— choose a month —</option>' +
      keys.map(k=>`<option value="${k}">${mpFormatMonthLabel(k)}</option>`).join('');
  }catch(e){
    console.error(e);
    document.getElementById('monthStatus').textContent = 'Failed to load months: ' + e.message;
  }
}

let currentMonthDoc = null;

function loadMonth(){
  const key = document.getElementById('monthSelect').value;
  const statusEl = document.getElementById('monthStatus');
  const remarkEl = document.getElementById('monthRemark');
  if(!key){ statusEl.textContent='Pick a month above to load monthly performance.'; document.getElementById('monthContent').innerHTML=''; remarkEl.style.display='none'; return; }
  currentMonthDoc = mpSavedMonths[key];
  if(!currentMonthDoc){ statusEl.textContent='No data found for that month.'; document.getElementById('monthContent').innerHTML=''; return; }
  statusEl.textContent = `Showing ${mpFormatMonthLabel(key)} — Target: ${currentMonthDoc.target||600} pts/person`;
  if(currentMonthDoc.remark){ remarkEl.style.display='block'; remarkEl.textContent = currentMonthDoc.remark; }
  else { remarkEl.style.display='none'; }
  renderMonth();
}

function renderMonth(){
  if(!currentMonthDoc) return;
  const terms = nameFilter('monthSearch');
  const target = currentMonthDoc.target || 600;
  const html = GROUPS.map(g=>{
    const rows = toArray(currentMonthDoc[g.key]).filter(r=>matchesFilter(r.fullname||r.username, terms));
    if(!rows.length){
      return `<div class="group"><h3><span class="dot" style="background:${g.dot}"></span>${g.label}</h3><div class="empty">No matching records</div></div>`;
    }
    let grandTotal = 0;
    const body = rows.map((r,i)=>{
      const total = r.total||0;
      grandTotal += total;
      const pct = target>0 ? ((total/target)*100).toFixed(1) : '0.0';
      const pctNum = parseFloat(pct);
      const pctBg = pctNum>=100?'#dcfce7':pctNum>=75?'#fef9c3':pctNum>=50?'#fef3c7':'#fee2e2';
      const pctColor = pctNum>=100?'#166534':pctNum>=75?'#854d0e':pctNum>=50?'#92400e':'#991b1b';
      return `<tr>
        <td>${i+1}</td>
        <td>${escapeHtml(r.fullname||r.username||'')}</td>
        <td><strong>${total}</strong></td>
        <td><span class="badge" style="background:${pctBg};color:${pctColor};">${pct}%</span></td>
      </tr>`;
    }).join('');
    const grpPct = target>0 && rows.length>0 ? ((grandTotal/(rows.length*target))*100).toFixed(1) : '0.0';
    return `<div class="group">
      <h3><span class="dot" style="background:${g.dot}"></span>${g.label}</h3>
      <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>S/N</th><th>Full Name</th><th>Total</th><th>% Target Met (${target} pts)</th></tr></thead>
        <tbody>${body}</tbody>
        <tfoot><tr><td colspan="2">TOTAL</td><td>${grandTotal}</td><td>${grpPct}%</td></tr></tfoot>
      </table>
      </div>
    </div>`;
  }).join('');
  document.getElementById('monthContent').innerHTML = html;
}

// ── init ──
(function init(){
  const today = new Date().toISOString().substring(0,10);
  document.getElementById('dashDate').value = today;
  loadDashboardForDate();
  mpLoadMonthList();
})();
</script>
</body>
</html>
